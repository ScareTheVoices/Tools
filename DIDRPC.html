<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="Yugioh_Card_Back.jpg">
    <title>Yu-Gi-Oh! Duelist Card Creator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap');
        /* Define CSS variables for easier color management */
        :root {
            --main-border-color: #88d0ff; /* Default light blue border color */
            --hover-shadow-color: #88d0ff; /* Default hover shadow color */
            --detail-text-color: #88d0ff; /* Default color for Rank, Deck, etc. labels */
            --input-text-color: #f0f0f0; /* Default color for input field text */
            --input-font-size: 16px; /* Consistent font size for all inputs in regular view */
            --card-image-fit: cover; /* Default custom card framing behavior */
            --card-image-position: center center; /* Default card crop focus */
        }

        body {
            background: linear-gradient(to bottom, #1a1a1a, #0d0d0d); /* Darker, sleek background */
            color: #e0e0e0; /* Light text for dark background */
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Cinzel', 'Times New Roman', serif; /* Yu-Gi-Oh style font */
            font-weight: 900;
            overflow: auto; /* Allow scrolling if content exceeds viewport height */
        }
        /* Main container for the character card */
        .main-layout-container {
            display: flex;
            flex-direction: column; /* Stack card and controls vertically */
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .character-card {
            background: linear-gradient(to bottom, #2b2b2b, #1a1a1a); /* Dark gray, metallic feel */
            border-radius: 0; /* Sharper edges */
            padding: 20px; /* Adjusted padding to account for the new outer trim */
            width: 680px; /* FIXED WIDTH */
            height: 360px; /* FIXED HEIGHT */
            box-shadow: 0px 12px 40px rgba(0, 0, 0, 0.9); /* Stronger, deeper shadow */
            display: flex;
            flex-direction: row; /* Arrange elements horizontally */
            align-items: center; /* Center items vertically */
            justify-content: space-between; /* Distribute space */
            box-sizing: border-box; /* Include padding in width/height */
            border: none; /* REMOVED the main border here */
            overflow: hidden; /* Ensure content stays within bounds */
            position: relative; /* For absolute positioning of elements if needed */
            transition: all 0.3s ease-in-out; /* Smooth transition for fullscreen */
        }

        /* Fullscreen specific styles */
        .character-card:fullscreen {
            width: 100vw;
            height: 100vh;
            padding: 2vw; /* Added padding for spacing from edges */
            border: none; /* Remove border in fullscreen */
            box-shadow: none; /* Remove main card shadow in fullscreen, children shadows persist */
            display: flex;
            flex-direction: row;
            align-items: flex-start; /* Align items to the top for consistent vertical positioning */
            justify-content: space-between; /* Distribute space */
            background: #0d0d0d; /* Dark background for fullscreen */
        }

        .character-card:fullscreen .duelist-name-top {
            font-size: 3vw; /* Adjust font size for fullscreen */
            padding: 1vw 2vw;
            width: 30vw; /* Adjust width for fullscreen */
            border-top: 4px solid var(--main-border-color); /* Fixed pixel border */
            border-left: 4px solid var(--main-border-color); /* Fixed pixel border */
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
        }

        .character-card:fullscreen .duelist-name-top input {
            font-size: 2.5vw; /* Consistent font size for nameplate input in fullscreen */
        }

        .character-card:fullscreen .portrait {
            width: 25vw; /* Increased size for better proportion in fullscreen */
            height: 75vh; /* Increased size for better proportion in fullscreen */
            border: 3px solid var(--main-border-color); /* Fixed pixel border */
            margin-right: 2vw; /* Adjusted margin */
            /* Calculated margin-top to place it below the nameplate in fullscreen */
            margin-top: calc(3.5vw); /* Card top padding (2vw) + nameplate height (approx 4.5vw) - card padding (2vw) */
            /* box-shadow will be handled by JS to scale glow */
        }

        .character-card:fullscreen .portrait img {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        .character-card:fullscreen .id-details {
            font-size: 2vw; /* Adjust font size for fullscreen */
            padding: 0 2vw;
            margin-top: calc(4.5vw); /* Align with portrait's top */
            height: 75vh; /* Match portrait height for visual consistency */
            display: flex; /* Ensure it's a flex container */
            flex-direction: column; /* Stack children vertically */
            justify-content: center; /* Vertically centers content within the column */
            align-items: flex-start; /* Align text to the left */
        }

        .character-card:fullscreen .dueling-team-banner-container {
           width: 100%; /* Changed from 30vw to 100% */
           height: 25vh;
           display: flex;
           justify-content: center;
           align-items: center;
           background-color: #1a1a1a;
           border: 2px solid var(--main-border-color); /* Changed to solid */
           box-sizing: border-box;
           overflow: hidden;
           margin-bottom: 1vw;
        }

        .character-card:fullscreen .dueling-team-banner-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover; /* Changed to cover */
            object-position: center; /* Added for consistency */
        }

        .character-card:fullscreen .id-details-stats p {
            font-size: 2.5vw; /* Adjust font size for labels in fullscreen */
        }

        .character-card:fullscreen .id-details-stats input {
            font-size: 2.5vw; /* Consistent font size for stats inputs in fullscreen */
        }

        .character-card:fullscreen .card-list {
               width: 26vw;
               height: 75vh; /* Match portrait height for visual consistency */
               margin-left: 3vw;
               border-left: 2px solid var(--main-border-color);
               padding-left: 2vw;
               margin-top: calc(4.5vw); /* Align with portrait's top */
               display: flex; /* Ensure it's a flex container */
               flex-direction: column; /* Stack children vertically */
               justify-content: center; /* Center content vertically within its own height */
               align-items: center; /* Center card image */
        }
    

        .character-card:fullscreen #selectedCardImg {
                width: 100%;
                height: auto;
                max-width: 19vw;
                max-height: 53vh;
                border: 2px solid #ffd700;
        }

        /* BW Trainer Card specific background elements (subtle pattern) */
        .character-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://placehold.co/680x360/2b2b2b/1a1a1a?text=BW+Pattern'); /* Placeholder for a subtle background pattern */
            background-size: cover;
            opacity: 0.05; /* Very subtle pattern */
            z-index: 0;
            transition: opacity 0.3s ease-in-out; /* Smooth transition for pattern fade */
        }

        /* Hide the pattern when a custom background is applied */
        .character-card.has-custom-bg::before {
            opacity: 0;
        }

        /* Cool Trim for the card - NOW THE MAIN BORDER */
        .character-card::after {
            content: '';
            position: absolute;
            top: 0; /* Aligns with the very edge of the character-card */
            left: 0; /* Aligns with the very edge of the character-card */
            right: 0; /* Aligns with the very edge of the character-card */
            bottom: 0; /* Aligns with the very edge of the character-card */
            border: 4px solid var(--main-border-color); /* Uses CSS variable */
            border-radius: 0; /* Sharper edges for the trim */
            z-index: 1; /* Ensure it's above the background pattern but below content */
            pointer-events: none; /* Ensure it doesn't interfere with clicks */
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5); /* Added inner shadow for solidity */
        }


        /* Portrait section - Duelist image area */
        .portrait {
           display: flex;
           flex-direction: column;
           align-items: center;
           justify-content: center;
           width: 180px;
           height: 88%;
           margin-right: 25px;
           background-color: #1a1a1a;
           border-radius: 0;
           overflow: hidden;
           border: 3px solid var(--main-border-color); /* Uses CSS variable */
           box-shadow: 0 0 15px rgba(136, 208, 255, 0.7); /* This shadow will be updated by JS */
           z-index: 1;
        }
        /* Ensure the button inside the portrait fills its container */
        .portrait button {
            width: 100%;
            height: 100%;
            display: flex; /* Make button a flex container to center its content */
            justify-content: center; /* Center image horizontally */
            align-items: flex-start; /* Align image to the top vertically */
        }
        .portrait img {
            width: 100%;
            height: 100%;
            object-fit: fill;
            border-radius: 0;
            border: none;
            box-shadow: none;
        }

        /* Duelist Name positioned as an overlay above portrait */
        .duelist-name-top {
            position: absolute;
            top: 0; /* Aligns with the very top edge of the card */
            left: 0; /* Aligns with the very left edge of the card */
            width: 240px; /* Increased width for bigger nameplate */
            background-color: #1a1a1a; /* Solid background for readability */
            padding: 10px 0; /* Adjusted padding for bigger nameplate */
            border-radius: 0; /* Sharper edges */
            z-index: 3; /* Ensure it's above the image and trim */
            white-space: nowrap; /* Prevent name from wrapping */
            text-align: center; /* Center text within its own div */
            box-sizing: border-box; /* Include padding in width */
            overflow: hidden; /* Hide overflow if name is too long */
            text-overflow: ellipsis; /* Add ellipsis for long names */
            border-top: 4px solid var(--main-border-color); /* Uses CSS variable */
            border-left: 4px solid var(--main-border-color); /* Uses CSS variable */
            /* Clip path for sharp bottom-right corner */
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
        }
        /* Removed ::after and ::before pseudo-elements as clip-path handles the shape */
        .duelist-name-top input {
            color: #f0f0f0; /* Light text for input value */
            font-size: var(--input-font-size); /* Uses new CSS variable */
            border: none;
            background: none;
            width: 100%; /* Take full width of its container */
            text-align: center; /* Center text within input */
            padding: 0;
        }


        /* ID Details - Duelist Stat Block */
        .id-details {
            flex: 1.5; /* Allow details to take more space */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start; /* Align text to the left */
            width: auto; /* Auto width */
            padding: 0 15px; /* Padding for stat block */
            color: #e0e0e0; /* Light text for dark background */
            font-size: 13px; /* Slightly smaller font to fit more info */
            text-transform: uppercase; /* BW style often uses uppercase for labels */
            z-index: 1;
        }

        .dueling-team-banner-container {
            width: 200px; /* Fixed width for the banner in regular view */
            height: 80px; /* Fixed height for the banner in regular view */
            display: flex; /* Default to flex, will be overridden by JS if not uploaded */
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            border: 2px dashed var(--main-border-color);
            box-sizing: border-box;
            overflow: hidden; /* Ensure image is clipped if larger than container */
            margin-bottom: 10px; /* Space between banner and stats */
        }

        .dueling-team-banner-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Image scales down to fit, maintaining aspect ratio */
        }

        .id-details-stats p {
            margin: 4px 0; /* Tighter spacing for stats */
            display: flex;
            align-items: center;
            width: 100%;
            border-bottom: 1px solid #4a4a4a; /* Subtle dark gray line separator */
            padding-bottom: 4px;
        }
        .id-details-stats p:last-child {
            border-bottom: none; /* No line after last stat */
        }
        .id-details-stats .stat-label-input {
            font-weight: bold;
            color: var(--detail-text-color);
            min-width: 53px;
            width: 53px;
            text-align: left;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .id-details-stats .stat-value-input {
            color: var(--input-text-color);
            font-size: var(--input-font-size);
            width: calc(100% - 70px);
        }
        .id-details-stats .stat-label-input,
        .id-details-stats .stat-value-input {
            border: none;
            background: none;
            border-bottom: none;
            text-align: left;
            padding: 0;
        }
        .stat-remove-btn {
            display: none;
            margin-left: auto;
            flex-shrink: 0;
            background: none;
            border: none;
            color: #ff5555;
            font-size: 14px;
            line-height: 1;
            cursor: pointer;
            padding: 0 2px;
            font-family: inherit;
        }
        .id-details-stats p:hover .stat-remove-btn {
            display: inline-block;
        }
        .html2canvas-capture .stat-remove-btn {
            display: none !important;
        }

        /* Featured Yu-Gi-Oh! Card Section */
        .card-list {
            display: flex;
            flex-direction: column; /* Stack the single card vertically */
            justify-content: center;
            align-items: center;
            width: 150px; /* Reverted to original size */
            height: 100%; /* Take full height of card padding area */
            margin-left: 25px; /* Space to the left of the card */
            border-left: 2px solid var(--main-border-color); /* Uses CSS variable */
            padding-left: 15px;
            z-index: 1;
        }
        #selectedCardImg {
            width: 111%; /* Reverted to original size */
            height: 219px; /* Reverted to original size */
            max-width: 150px; /* Reverted to original size */
            max-height: 219px; /* Reverted to original size */
            border-radius: 0;
            object-fit: var(--card-image-fit);
            object-position: var(--card-image-position);
            border: 2px solid #ffd700; /* Gold border for the card */
            background: #fff;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.7); /* Gold shadow */
        }

        /* Control bar below the card */
        .control-bar {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            width: min(1100px, 95vw);
            padding: 10px;
            box-sizing: border-box;
        }
        .control-bar .action-btn {
            flex: 0 0 auto;
            white-space: nowrap;
        }
        .control-bar #cardFilter,
        .control-bar #cardDropdown,
        .control-bar #cardImageFitMode,
        .control-bar #cardImageFocus {
            padding: 8px;
            font-size: 0.9em;
            border-radius: 6px;
            border: 1px solid #444;
            background: #1e1e1e;
            color: #f0f0f0;
            box-sizing: border-box;
            flex: 1 1 220px;
            min-width: 180px;
            max-width: 260px;
        }
        .control-bar #cardDropdown {
            min-width: 180px;
        }

        .screenshot-preview-modal {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.82);
            z-index: 9999;
            padding: 20px;
            box-sizing: border-box;
        }

        .screenshot-preview-panel {
            width: min(900px, 95vw);
            max-height: 95vh;
            background: linear-gradient(to bottom, #1b1b1b, #0f0f0f);
            border: 2px solid var(--main-border-color);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
            padding: 14px;
            box-sizing: border-box;
        }

        .screenshot-preview-panel h3 {
            margin: 0 0 10px;
            font-size: 18px;
            color: #f0f0f0;
            text-align: center;
        }

        .screenshot-preview-image-wrap {
            width: 100%;
            max-height: 72vh;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: #121212;
            border: 1px solid #333;
            padding: 8px;
            box-sizing: border-box;
        }

        #screenshotPreviewImage {
            width: 100%;
            height: auto;
            max-width: 100%;
            object-fit: contain;
            display: block;
        }

        .screenshot-preview-actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* General button styling */
        .action-btn {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(to bottom, #23272b, #1e1e1e);
            border: 2px solid var(--main-border-color); /* Uses CSS variable */
            border-radius: 8px;
            cursor: pointer;
            transition: box-shadow 0.2s, transform 0.1s;
        }
        .action-btn:hover {
            box-shadow: 0 0 12px var(--hover-shadow-color); /* Uses CSS variable */
            transform: translateY(-2px);
        }
        .action-btn:active {
            transform: translateY(0);
        }

        /* Force all card content to use the bold Cinzel font */
        .character-card,
        .character-card * {
            font-family: 'Matrix Bold', 'Cinzel', 'Times New Roman', serif;
            font-weight: 900;
        }

        /* Responsive adjustments */
        @media (max-width: 720px) { /* Adjust breakpoint for horizontal card */
            .character-card, .control-bar {
                width: 95vw; /* Make card responsive to smaller screens */
                height: auto; /* Auto height for stacked content */
                padding: 15px;
                flex-direction: column; /* Stack elements vertically on smaller screens */
            }
            .portrait {
                width: 80%; /* Adjust portrait width for stacked layout */
                height: 250px; /* Fixed height for portrait on small screens */
                margin-right: 0;
                margin-bottom: 15px;
            }
            .duelist-name-top {
                top: 0; /* Aligns with the very top edge of the card */
                left: 0; /* Aligns with the very left edge of the card */
                transform: none; /* Remove transform for stacked layout */
                font-size: 3.5vw;
                padding: 3px 10px;
                width: 100%; /* Take full width */
            }
            .duelist-name-top input { /* Only input, no label */
                font-size: 3.5vw;
            }
            .id-details {
                padding: 0 5px;
                align-items: center; /* Center stats for stacked layout */
            }
            .id-details p {
                font-size: 3.5vw; /* Adjust font size for smaller screens */
                flex-direction: column; /* Stack label and input */
                align-items: center;
            }
            .id-details label {
                min-width: auto;
                text-align: center;
                margin-right: 0;
                margin-bottom: 5px;
            }
            .id-details input {
                font-size: 3.5vw;
                width: 90%;
                text-align: center;
            }
            .card-list {
                width: 100%;
                height: auto; /* Allow height to adjust based on content */
                margin-left: 0;
                margin-top: 15px;
                border-left: none; /* Remove left border */
                border-top: 2px solid var(--main-border-color); /* Uses CSS variable */
                padding-left: 0;
                padding-top: 10px;
                flex-direction: row; /* Keep card in a row on small screens */
                justify-content: center;
            }
            #selectedCardImg {
                width: 100px; /* Adjust card image size for small screens */
                height: 145px;
            }
            .control-bar {
                flex-direction: column;
                gap: 10px;
            }
            .control-bar #cardFilter,
            .control-bar #cardDropdown,
            .control-bar #cardImageFitMode,
            .control-bar #cardImageFocus {
                max-width: 90%;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="main-layout-container">
        <div class="character-card" id="characterCard">
            <!-- Background pattern layer -->
            <div class="character-card-bg-pattern"></div>

            <!-- Duelist Name positioned as an overlay above portrait -->
            <div class="duelist-name-top">
                <input id="duelistName" type="text" value="YUGI MUTO">
            </div>

            <div class="portrait">
                <button id="uploadPortraitBtn" style="background:none;border:none;padding:0;cursor:pointer; width:100%; height:100%;">
                    <img id="portraitImage" src="https://placehold.co/180x280/555/fff?text=Duelist+Portrait" alt="Duelist Portrait">
                </button>
                <input type="file" id="portraitInput" accept="image/*" style="display:none;">
            </div>
            <div class="id-details">
                <div class="id-details-stats" id="idDetailsStats">
                    <p>
                        <input class="stat-label-input" type="text" value="Rank:" aria-label="Stat label">
                        <input class="stat-value-input" type="text" value="King of Games" aria-label="Stat value">
                    </p>
                    <p>
                        <input class="stat-label-input" type="text" value="Deck:" aria-label="Stat label">
                        <input class="stat-value-input" type="text" value="Dark Magician" aria-label="Stat value">
                    </p>
                    <p>
                        <input class="stat-label-input" type="text" value="Duels:" aria-label="Stat label">
                        <input class="stat-value-input" type="text" value="135" aria-label="Stat value">
                    </p>
                    <p>
                        <input class="stat-label-input" type="text" value="Wins:" aria-label="Stat label">
                        <input class="stat-value-input" type="text" value="120" aria-label="Stat value">
                    </p>
                    <p>
                        <input class="stat-label-input" type="text" value="Losses:" aria-label="Stat label">
                        <input class="stat-value-input" type="text" value="15" aria-label="Stat value">
                    </p>
                </div>
            </div>
            <div class="card-list">
                <!-- Featured Yu-Gi-Oh! Card -->
                <img id="selectedCardImg" src="https://placehold.co/150x220/000/fff?text=Favorite+Card" alt="Selected Yu-Gi-Oh! Card">
            </div>
        </div>
    </div>

    <!-- Control bar for buttons and dropdowns -->
    <div class="control-bar">
        <button class="action-btn" id="fullscreenBtn">Toggle Fullscreen</button>
        <button class="action-btn" id="saveIdScreenshotBtn">Screenshot</button>
        <button class="action-btn" id="uploadBackgroundBtn">Upload Background</button>
        <button class="action-btn" id="uploadCardImageBtn">Upload Card Image</button>
        <button class="action-btn" id="exportPresetBtn">Export Design Preset</button>
        <button class="action-btn" id="importPresetBtn">Import Design Preset</button>
        <button class="action-btn" id="changeBorderColorBtn">Change Border Color</button>
        <button class="action-btn" id="changeDetailTextColorBtn">Change Detail Text Color</button>
        <button class="action-btn" id="changeInputTextColorBtn">Change Input Text Color</button>
        <button class="action-btn" id="addStatRowBtn">+ Add Stat</button>
        <select id="cardImageFitMode" title="Card Image Fit Mode">
            <option value="cover" selected>Auto Crop (Fill Frame)</option>
            <option value="contain">Fit Entire Card</option>
            <option value="fill">Stretch to Frame</option>
        </select>
        <select id="cardImageFocus" title="Card Image Focus Position">
            <option value="top center">Focus Top</option>
            <option value="center center" selected>Focus Center</option>
            <option value="bottom center">Focus Bottom</option>
        </select>
        <input type="text" id="cardFilter" placeholder="Search cards...">
        <select id="cardDropdown">
            <option disabled selected>Select a Yu-Gi-Oh! card</option>
        </select>
    </div>
    <input type="file" id="backgroundInput" accept="image/*" style="display:none;">
    <input type="file" id="cardImageInput" accept="image/*" style="display:none;">
    <input type="file" id="importPresetInput" accept="application/json,.json" style="display:none;">
    <input type="color" id="borderColorInput" style="display:none;" value="#88d0ff">
    <input type="color" id="detailTextColorInput" style="display:none;" value="#88d0ff">
    <input type="color" id="inputTextColorInput" style="display:none;" value="#f0f0f0">

    <div class="screenshot-preview-modal" id="screenshotPreviewModal">
        <div class="screenshot-preview-panel">
            <h3>Screenshot Simulation Preview</h3>
            <div class="screenshot-preview-image-wrap">
                <img id="screenshotPreviewImage" alt="Screenshot simulation preview">
            </div>
            <div class="screenshot-preview-actions">
                <button class="action-btn" id="downloadPreviewScreenshotBtn">Download This Image</button>
                <button class="action-btn" id="closePreviewModalBtn">Close Preview</button>
            </div>
        </div>
    </div>


    <script>
        let allCards = [];
        const cardDropdown = document.getElementById('cardDropdown');
        const cardFilter = document.getElementById('cardFilter');
        const selectedCardImg = document.getElementById('selectedCardImg');
        const characterCard = document.getElementById('characterCard');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const saveIdScreenshotBtn = document.getElementById('saveIdScreenshotBtn');
        const uploadBackgroundBtn = document.getElementById('uploadBackgroundBtn');
        const uploadCardImageBtn = document.getElementById('uploadCardImageBtn');
        const exportPresetBtn = document.getElementById('exportPresetBtn');
        const importPresetBtn = document.getElementById('importPresetBtn');
        const backgroundInput = document.getElementById('backgroundInput');
        const cardImageInput = document.getElementById('cardImageInput');
        const importPresetInput = document.getElementById('importPresetInput');
        const changeBorderColorBtn = document.getElementById('changeBorderColorBtn');
        const borderColorInput = document.getElementById('borderColorInput');
        const changeDetailTextColorBtn = document.getElementById('changeDetailTextColorBtn');
        const detailTextColorInput = document.getElementById('detailTextColorInput');
        const changeInputTextColorBtn = document.getElementById('changeInputTextColorBtn');
        const inputTextColorInput = document.getElementById('inputTextColorInput');
        const cardImageFitMode = document.getElementById('cardImageFitMode');
        const cardImageFocus = document.getElementById('cardImageFocus');
        const portrait = document.querySelector('.portrait'); // Get reference to portrait for shadow update
        const screenshotPreviewModal = document.getElementById('screenshotPreviewModal');
        const screenshotPreviewImage = document.getElementById('screenshotPreviewImage');
        const downloadPreviewScreenshotBtn = document.getElementById('downloadPreviewScreenshotBtn');
        const closePreviewModalBtn = document.getElementById('closePreviewModalBtn');
        const duelistName = document.getElementById('duelistName');
        const idDetailsStats = document.getElementById('idDetailsStats');
        const addStatRowBtn = document.getElementById('addStatRowBtn');
        let lastScreenshotDataUrl = '';

        function hexToRgbA(hex, alpha) {
            let normalizedHex = hex.replace('#', '').trim();

            if (normalizedHex.length === 3) {
                normalizedHex = normalizedHex.split('').map(char => char + char).join('');
            }

            if (normalizedHex.length !== 6) {
                throw new Error('Invalid hex color.');
            }

            const r = parseInt(normalizedHex.substring(0, 2), 16);
            const g = parseInt(normalizedHex.substring(2, 4), 16);
            const b = parseInt(normalizedHex.substring(4, 6), 16);

            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function createStatRow(label, value) {
            const row = document.createElement('p');

            const labelInput = document.createElement('input');
            labelInput.type = 'text';
            labelInput.className = 'stat-label-input';
            labelInput.setAttribute('aria-label', 'Stat label');
            labelInput.value = (label || '').trim() || 'Stat:';

            const valueInput = document.createElement('input');
            valueInput.type = 'text';
            valueInput.className = 'stat-value-input';
            valueInput.setAttribute('aria-label', 'Stat value');
            valueInput.value = value || '';

            const removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.className = 'stat-remove-btn';
            removeBtn.textContent = '\u00d7';
            removeBtn.setAttribute('aria-label', 'Remove stat row');
            removeBtn.addEventListener('click', () => {
                if (idDetailsStats.querySelectorAll('p').length <= 1) return;
                row.remove();
                scheduleAutoSave();
            });

            row.appendChild(labelInput);
            row.appendChild(valueInput);
            row.appendChild(removeBtn);
            return row;
        }

        function getCurrentStatRows() {
            return Array.from(idDetailsStats.querySelectorAll('p')).map((row) => {
                const labelInput = row.querySelector('.stat-label-input');
                const valueInput = row.querySelector('.stat-value-input');
                return {
                    label: labelInput ? labelInput.value : '',
                    value: valueInput ? valueInput.value : ''
                };
            });
        }

        function setStatRows(rows) {
            idDetailsStats.innerHTML = '';

            rows.forEach((row) => {
                idDetailsStats.appendChild(createStatRow(row.label, row.value));
            });

            if (!idDetailsStats.querySelector('p')) {
                idDetailsStats.appendChild(createStatRow('Stat:', ''));
            }
        }

        // Fetch Yu-Gi-Oh! card data
        fetch('https://db.ygoprodeck.com/api/v7/cardinfo.php')
            .then(res => res.json())
            .then(data => {
                allCards = data.data;
                populateDropdown(allCards);
            })
            .catch(err => {
                console.error('Card loading error:', err);
                cardDropdown.innerHTML = `<option disabled>Failed to load cards</option>`;
            });

        // Populate the card dropdown with fetched data
        function populateDropdown(cards) {
            cardDropdown.innerHTML = `<option disabled selected>Select a Yu-Gi-Oh! card</option>`;
            cards.forEach(card => {
                const option = document.createElement('option');
                option.value = card.card_images[0].image_url;
                option.textContent = card.name;
                cardDropdown.appendChild(option);
            });
        }

        // Filter cards based on user input
        cardFilter.addEventListener('input', () => {
            const searchVal = cardFilter.value.toLowerCase();
            const filteredCards = allCards.filter(card => card.name.toLowerCase().includes(searchVal));
            populateDropdown(filteredCards);
        });

        addStatRowBtn.addEventListener('click', () => {
            idDetailsStats.appendChild(createStatRow('Stat:', ''));
            scheduleAutoSave();
        });

        idDetailsStats.addEventListener('input', () => {
            scheduleAutoSave();
        });

        // Update selected card image when dropdown changes
        cardDropdown.addEventListener('change', function () {
            const selectedOption = this.options[this.selectedIndex];
            const cardImgURL = selectedOption.value;
            selectedCardImg.src = cardImgURL;
            selectedCardImg.alt = selectedOption.textContent;
            scheduleAutoSave();
        });

        // Handle portrait image upload
        const uploadPortraitBtn = document.getElementById('uploadPortraitBtn');
        const portraitInput = document.getElementById('portraitInput');
        const portraitImage = document.getElementById('portraitImage');

        function enforcePortraitFrameFill() {
            portraitImage.style.width = '100%';
            portraitImage.style.height = '100%';
            portraitImage.style.maxWidth = 'none';
            portraitImage.style.maxHeight = 'none';
            portraitImage.style.objectFit = 'fill';
            portraitImage.style.objectPosition = '';
        }

        function getPortraitFrameSize() {
            const rect = portraitImage.getBoundingClientRect();
            const measuredWidth = Math.round(rect.width);
            const measuredHeight = Math.round(rect.height);

            if (measuredWidth > 0 && measuredHeight > 0) {
                return {
                    width: measuredWidth,
                    height: measuredHeight
                };
            }

            return {
                width: 180,
                height: 317
            };
        }

        function cropPortraitToNormalFrame(sourceDataUrl) {
            return new Promise((resolve, reject) => {
                const img = new Image();

                img.onload = () => {
                    const targetSize = getPortraitFrameSize();
                    const targetWidth = targetSize.width;
                    const targetHeight = targetSize.height;
                    const dpr = Math.max(window.devicePixelRatio || 1, 2);
                    const canvas = document.createElement('canvas');
                    canvas.width = targetWidth * dpr;
                    canvas.height = targetHeight * dpr;
                    const ctx = canvas.getContext('2d');

                    if (!ctx) {
                        reject(new Error('Could not create canvas context.'));
                        return;
                    }

                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

                    // Cover: scale to fill current frame size, anchor top-center.
                    const scale = Math.max(targetWidth / img.naturalWidth, targetHeight / img.naturalHeight);
                    const drawW = img.naturalWidth * scale;
                    const drawH = img.naturalHeight * scale;
                    const drawX = (targetWidth - drawW) / 2; // center horizontally
                    const drawY = 0;                 // anchor to top

                    ctx.drawImage(img, drawX, drawY, drawW, drawH);

                    resolve(canvas.toDataURL('image/png'));
                };

                img.onerror = () => reject(new Error('Failed to load portrait image for cropping.'));
                img.src = sourceDataUrl;
            });
        }

        enforcePortraitFrameFill();

        uploadPortraitBtn.onclick = () => {
            portraitInput.click();
        };

        portraitInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(evt) {
                try {
                    const croppedDataUrl = await cropPortraitToNormalFrame(evt.target.result);
                    portraitImage.src = croppedDataUrl;
                } catch (error) {
                    console.error('Portrait crop failed, using original image:', error);
                    portraitImage.src = evt.target.result;
                }

                enforcePortraitFrameFill();
                scheduleAutoSave();
            };
            reader.readAsDataURL(file);
        };

        // Fallback for broken portrait image
        portraitImage.onerror = function() {
            this.src = 'https://placehold.co/180x280/555/fff?text=Duelist+Portrait'; /* Fallback placeholder */
            this.style.background = '#555';
            enforcePortraitFrameFill();
        };

        // Fullscreen functionality
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                // Request fullscreen for the characterCard element
                if (characterCard.requestFullscreen) {
                    characterCard.requestFullscreen();
                } else if (characterCard.mozRequestFullScreen) { /* Firefox */
                    characterCard.mozRequestFullScreen();
                } else if (characterCard.webkitRequestFullscreen) { /* Chrome, Safari & Opera */
                    characterCard.webkitRequestFullscreen();
                } else if (characterCard.msRequestFullscreen) { /* IE/Edge */
                    characterCard.msRequestFullscreen();
                }
            } else {
                // Exit fullscreen
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.mozCancelFullScreen) { /* Firefox */
                    document.mozCancelFullScreen();
                } else if (document.webkitExitFullscreen) { /* Chrome, Safari and Opera */
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) { /* IE/Edge */
                    document.msExitFullscreen();
                }
            }
        });

        // Listen for fullscreen change events to adjust UI and shadows
        document.addEventListener('fullscreenchange', () => {
            const currentBorderColor = getComputedStyle(document.documentElement).getPropertyValue('--main-border-color').trim();
            if (document.fullscreenElement) {
                console.log('Entered fullscreen mode');
                // Scale portrait shadow using vw for glow effect
                try {
                    portrait.style.boxShadow = `0 0 2vw ${hexToRgbA(currentBorderColor, 0.7)}`;
                } catch (error) {
                    portrait.style.boxShadow = `0 0 2vw ${currentBorderColor}`;
                }
                // Scale card image shadow using vw for glow effect
                selectedCardImg.style.boxShadow = `0 0 2vw rgba(255, 215, 0, 0.7)`;
            } else {
                console.log('Exited fullscreen mode');
                // Revert to original shadows
                try {
                    portrait.style.boxShadow = `0 0 15px ${hexToRgbA(currentBorderColor, 0.7)}`;
                } catch (error) {
                    portrait.style.boxShadow = `0 0 15px ${currentBorderColor}`;
                }
                selectedCardImg.style.boxShadow = `0 0 15px rgba(255, 215, 0, 0.7)`;
            }
        });

        // Add similar fullscreen change listeners for other browser prefixes
        document.addEventListener('mozfullscreenchange', () => {
            const currentBorderColor = getComputedStyle(document.documentElement).getPropertyValue('--main-border-color').trim();
            if (document.mozFullScreenElement) {
                portrait.style.boxShadow = `0 0 2vw ${hexToRgbA(currentBorderColor, 0.7)}`;
                selectedCardImg.style.boxShadow = `0 0 2vw rgba(255, 215, 0, 0.7)`;
            } else {
                portrait.style.boxShadow = `0 0 15px ${hexToRgbA(currentBorderColor, 0.7)}`;
                selectedCardImg.style.boxShadow = `0 0 15px rgba(255, 215, 0, 0.7)`;
            }
        });

        document.addEventListener('webkitfullscreenchange', () => {
            const currentBorderColor = getComputedStyle(document.documentElement).getPropertyValue('--main-border-color').trim();
            if (document.webkitFullscreenElement) {
                portrait.style.boxShadow = `0 0 2vw ${hexToRgbA(currentBorderColor, 0.7)}`;
                selectedCardImg.style.boxShadow = `0 0 2vw rgba(255, 215, 0, 0.7)`;
            } else {
                portrait.style.boxShadow = `0 0 15px ${hexToRgbA(currentBorderColor, 0.7)}`;
                selectedCardImg.style.boxShadow = `0 0 15px rgba(255, 215, 0, 0.7)`;
            }
        });

        document.addEventListener('msfullscreenchange', () => {
            const currentBorderColor = getComputedStyle(document.documentElement).getPropertyValue('--main-border-color').trim();
            if (document.msFullscreenElement) {
                portrait.style.boxShadow = `0 0 2vw ${hexToRgbA(currentBorderColor, 0.7)}`;
                selectedCardImg.style.boxShadow = `0 0 2vw rgba(255, 215, 0, 0.7)`;
            } else {
                portrait.style.boxShadow = `0 0 15px ${hexToRgbA(currentBorderColor, 0.7)}`;
                selectedCardImg.style.boxShadow = `0 0 15px rgba(255, 215, 0, 0.7)`;
            }
        });

        // Handle background image upload
        uploadBackgroundBtn.addEventListener('click', () => {
            backgroundInput.click();
        });

        backgroundInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                characterCard.style.backgroundImage = 'url(' + evt.target.result + ')';
                characterCard.style.backgroundSize = 'cover';
                characterCard.style.backgroundPosition = 'center';
                characterCard.style.backgroundRepeat = 'no-repeat';
                characterCard.classList.add('has-custom-bg'); // Add class to hide pattern
                scheduleAutoSave();
            };
            reader.readAsDataURL(file);
        });

        // Handle featured card image upload
        uploadCardImageBtn.addEventListener('click', () => {
            cardImageInput.click();
        });

        cardImageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                selectedCardImg.src = evt.target.result;
                selectedCardImg.alt = file.name;
                cardDropdown.selectedIndex = 0;
                scheduleAutoSave();
            };
            reader.readAsDataURL(file);
        });

        // Card image framing controls for custom uploads
        cardImageFitMode.addEventListener('change', (e) => {
            document.documentElement.style.setProperty('--card-image-fit', e.target.value);
            scheduleAutoSave();
        });

        cardImageFocus.addEventListener('change', (e) => {
            document.documentElement.style.setProperty('--card-image-position', e.target.value);
            scheduleAutoSave();
        });

        // Simulate screenshot output by previewing the captured image before download.
        saveIdScreenshotBtn.addEventListener('click', async () => {
            const originalText = saveIdScreenshotBtn.textContent;
            saveIdScreenshotBtn.textContent = 'Capturing...';
            saveIdScreenshotBtn.disabled = true;

            try {
                characterCard.classList.add('html2canvas-capture');
                const canvas = await html2canvas(characterCard, {
                    useCORS: true,
                    allowTaint: false,
                    backgroundColor: null,
                    scale: Math.max(window.devicePixelRatio || 1, 2)
                });
                characterCard.classList.remove('html2canvas-capture');

                lastScreenshotDataUrl = canvas.toDataURL('image/png');
                screenshotPreviewImage.src = lastScreenshotDataUrl;
                screenshotPreviewModal.style.display = 'flex';
            } catch (error) {
                characterCard.classList.remove('html2canvas-capture');
                console.error('Screenshot failed:', error);
                alert('Could not capture screenshot. Try using uploaded local images for best compatibility.');
            } finally {
                saveIdScreenshotBtn.textContent = originalText;
                saveIdScreenshotBtn.disabled = false;
            }
        });

        downloadPreviewScreenshotBtn.addEventListener('click', () => {
            if (!lastScreenshotDataUrl) return;
            const link = document.createElement('a');
            link.href = lastScreenshotDataUrl;
            link.download = `duelist-id-${Date.now()}.png`;
            link.click();
        });

        closePreviewModalBtn.addEventListener('click', () => {
            screenshotPreviewModal.style.display = 'none';
        });

        screenshotPreviewModal.addEventListener('click', (e) => {
            if (e.target === screenshotPreviewModal) {
                screenshotPreviewModal.style.display = 'none';
            }
        });

        function getCurrentDesignPreset() {
            const rootStyles = getComputedStyle(document.documentElement);
            return {
                version: 1,
                exportedAt: new Date().toISOString(),
                cssVars: {
                    mainBorderColor: rootStyles.getPropertyValue('--main-border-color').trim(),
                    detailTextColor: rootStyles.getPropertyValue('--detail-text-color').trim(),
                    inputTextColor: rootStyles.getPropertyValue('--input-text-color').trim(),
                    cardImageFit: rootStyles.getPropertyValue('--card-image-fit').trim(),
                    cardImagePosition: rootStyles.getPropertyValue('--card-image-position').trim()
                },
                controls: {
                    borderColorInput: borderColorInput.value,
                    detailTextColorInput: detailTextColorInput.value,
                    inputTextColorInput: inputTextColorInput.value,
                    cardImageFitMode: cardImageFitMode.value,
                    cardImageFocus: cardImageFocus.value
                },
                background: {
                    image: characterCard.style.backgroundImage || '',
                    size: characterCard.style.backgroundSize || '',
                    position: characterCard.style.backgroundPosition || '',
                    repeat: characterCard.style.backgroundRepeat || '',
                    hasCustomBg: characterCard.classList.contains('has-custom-bg')
                },
                cardImage: {
                    src: selectedCardImg.src,
                    alt: selectedCardImg.alt
                },
                portraitImage: {
                    src: portraitImage.src,
                    alt: portraitImage.alt
                },
                textFields: {
                    duelistName: duelistName.value
                },
                statRows: getCurrentStatRows()
            };
        }

        function applyDesignPreset(preset) {
            if (!preset || typeof preset !== 'object') {
                throw new Error('Invalid preset file format.');
            }

            if (preset.cssVars) {
                if (preset.cssVars.mainBorderColor) {
                    document.documentElement.style.setProperty('--main-border-color', preset.cssVars.mainBorderColor);
                    document.documentElement.style.setProperty('--hover-shadow-color', preset.cssVars.mainBorderColor);
                    borderColorInput.value = preset.cssVars.mainBorderColor;
                    try {
                        portrait.style.boxShadow = `0 0 15px ${hexToRgbA(preset.cssVars.mainBorderColor, 0.7)}`;
                    } catch (error) {
                        portrait.style.boxShadow = `0 0 15px ${preset.cssVars.mainBorderColor}`;
                    }
                }
                if (preset.cssVars.detailTextColor) {
                    document.documentElement.style.setProperty('--detail-text-color', preset.cssVars.detailTextColor);
                    detailTextColorInput.value = preset.cssVars.detailTextColor;
                }
                if (preset.cssVars.inputTextColor) {
                    document.documentElement.style.setProperty('--input-text-color', preset.cssVars.inputTextColor);
                    inputTextColorInput.value = preset.cssVars.inputTextColor;
                }
                if (preset.cssVars.cardImageFit) {
                    document.documentElement.style.setProperty('--card-image-fit', preset.cssVars.cardImageFit);
                    cardImageFitMode.value = preset.cssVars.cardImageFit;
                }
                if (preset.cssVars.cardImagePosition) {
                    document.documentElement.style.setProperty('--card-image-position', preset.cssVars.cardImagePosition);
                    cardImageFocus.value = preset.cssVars.cardImagePosition;
                }
            }

            if (preset.background) {
                characterCard.style.backgroundImage = preset.background.image || '';
                characterCard.style.backgroundSize = preset.background.size || '';
                characterCard.style.backgroundPosition = preset.background.position || '';
                characterCard.style.backgroundRepeat = preset.background.repeat || '';

                if (preset.background.hasCustomBg) {
                    characterCard.classList.add('has-custom-bg');
                } else {
                    characterCard.classList.remove('has-custom-bg');
                }
            }

            if (preset.cardImage && preset.cardImage.src) {
                selectedCardImg.src = preset.cardImage.src;
                selectedCardImg.alt = preset.cardImage.alt || 'Selected Yu-Gi-Oh! Card';
                cardDropdown.selectedIndex = 0;
            }

            if (preset.portraitImage && preset.portraitImage.src) {
                portraitImage.src = preset.portraitImage.src;
                portraitImage.alt = preset.portraitImage.alt || 'Duelist Portrait';
                enforcePortraitFrameFill();
            }

            if (preset.textFields) {
                duelistName.value = preset.textFields.duelistName || duelistName.value;
            }

            if (Array.isArray(preset.statRows) && preset.statRows.length > 0) {
                setStatRows(preset.statRows);
            } else if (preset.textFields) {
                const legacyRows = [
                    { label: 'Rank:', value: preset.textFields.duelistRank || 'King of Games' },
                    { label: 'Deck:', value: preset.textFields.duelistDeckType || 'Dark Magician' },
                    { label: 'Duels:', value: preset.textFields.duelistDuelsPlayed || '135' },
                    { label: 'Wins:', value: preset.textFields.duelistWins || '120' },
                    { label: 'Losses:', value: preset.textFields.duelistLosses || '15' }
                ];
                setStatRows(legacyRows);
            }

            if (preset.controls) {
                if (preset.controls.cardImageFitMode) {
                    cardImageFitMode.value = preset.controls.cardImageFitMode;
                    document.documentElement.style.setProperty('--card-image-fit', preset.controls.cardImageFitMode);
                }
                if (preset.controls.cardImageFocus) {
                    cardImageFocus.value = preset.controls.cardImageFocus;
                    document.documentElement.style.setProperty('--card-image-position', preset.controls.cardImageFocus);
                }
            }
        }

        const AUTO_PRESET_STORAGE_KEY = 'duelist-card-auto-preset-v1';
        let autoSaveTimeoutId = null;

        function savePresetToLocalStorage() {
            try {
                const preset = getCurrentDesignPreset();
                localStorage.setItem(AUTO_PRESET_STORAGE_KEY, JSON.stringify(preset));
            } catch (error) {
                console.error('Auto-save failed:', error);
            }
        }

        function scheduleAutoSave() {
            if (autoSaveTimeoutId) {
                clearTimeout(autoSaveTimeoutId);
            }

            autoSaveTimeoutId = setTimeout(() => {
                savePresetToLocalStorage();
                autoSaveTimeoutId = null;
            }, 250);
        }

        function loadAutoSavedPreset() {
            try {
                const rawPreset = localStorage.getItem(AUTO_PRESET_STORAGE_KEY);
                if (!rawPreset) return;

                const preset = JSON.parse(rawPreset);
                applyDesignPreset(preset);
            } catch (error) {
                console.error('Auto-load failed:', error);
            }
        }

        exportPresetBtn.addEventListener('click', () => {
            try {
                const preset = getCurrentDesignPreset();
                const presetBlob = new Blob([JSON.stringify(preset, null, 2)], { type: 'application/json' });
                const presetUrl = URL.createObjectURL(presetBlob);

                const link = document.createElement('a');
                link.href = presetUrl;
                link.download = `duelist-card-preset-${Date.now()}.json`;
                link.click();

                URL.revokeObjectURL(presetUrl);
            } catch (error) {
                console.error('Preset export failed:', error);
                alert('Could not export preset.');
            }
        });

        importPresetBtn.addEventListener('click', () => {
            importPresetInput.click();
        });

        importPresetInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const preset = JSON.parse(evt.target.result);
                    applyDesignPreset(preset);
                    savePresetToLocalStorage();
                } catch (error) {
                    console.error('Preset import failed:', error);
                    alert('Invalid preset file. Please select a valid JSON preset.');
                }
            };
            reader.readAsText(file);
            importPresetInput.value = '';
        });

        // Handle border color change
        changeBorderColorBtn.addEventListener('click', () => {
            borderColorInput.click();
        });

        borderColorInput.addEventListener('change', (e) => {
            const newColor = e.target.value;
            // Update CSS variables
            document.documentElement.style.setProperty('--main-border-color', newColor);
            document.documentElement.style.setProperty('--hover-shadow-color', newColor);

            // Update portrait box-shadow with rgba for transparency
            try {
                portrait.style.boxShadow = `0 0 15px ${hexToRgbA(newColor, 0.7)}`;
            } catch (error) {
                console.error("Error setting portrait shadow:", error);
                // Fallback to a solid shadow if conversion fails
                portrait.style.boxShadow = `0 0 15px ${newColor}`;
            }
            scheduleAutoSave();
        });

        // Handle detail text color change (labels)
        changeDetailTextColorBtn.addEventListener('click', () => {
            detailTextColorInput.click();
        });

        detailTextColorInput.addEventListener('change', (e) => {
            const newColor = e.target.value;
            document.documentElement.style.setProperty('--detail-text-color', newColor);
            scheduleAutoSave();
        });

        // Handle input text color change (values in input fields)
        changeInputTextColorBtn.addEventListener('click', () => {
            inputTextColorInput.click();
        });

        inputTextColorInput.addEventListener('change', (e) => {
            const newColor = e.target.value;
            document.documentElement.style.setProperty('--input-text-color', newColor);
            scheduleAutoSave();
        });

        // Auto-save when core text fields are edited.
        duelistName.addEventListener('input', scheduleAutoSave);

        // Restore any previous auto-saved preset when the page loads.
        loadAutoSavedPreset();
    </script>

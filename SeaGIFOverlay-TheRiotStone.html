<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{width:1920px;height:1080px;overflow:hidden;background:transparent}
    #overlay-root{position:relative;width:1920px;height:1080px;isolation:isolate}
    @keyframes float-bob {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(var(--float-x, 0px), var(--float-y, -8px)); }
    }
  </style>
</head>
<body>
<div id="overlay-root">
<div style="position:absolute;left:70px;top:70px;width:1272px;height:715px;z-index:2;opacity:1">
  <div style="position:absolute;inset:0;background:#000;border-radius:nullpx;mix-blend-mode:destination-out"></div>
          <div style="position:absolute;inset:0;border:2px solid #a78bfa;border-radius:nullpx;box-sizing:border-box"></div>
</div>
<div style="position:absolute;left:1379px;top:380px;width:498px;height:607px;z-index:4;opacity:1;filter:drop-shadow(-3.8px -1.3px 12px rgba(0,0,0,0.45))">
  <div id="ut_3" style="width:100%;height:100%;padding:6px;background:rgba(0,0,0,0);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;gap:4px">
        
  <div id="ut_list_3" style="font-size:16px;font-family:Comic Sans MS;color:#eed583;overflow:hidden;flex:1;min-height:0;position:relative">Connecting...</div>
</div>
<script>
(function(){
  var mode='chat', utilStyle='text-chat', utilCustomColors=true, user='', token='', maxItems=30, streams=[{"channel":"scarethevoices","color":"#eed583"}];
  var listEl=document.getElementById('ut_list_3');
  var headEl=document.getElementById('ut_head_3');
  var items=[];
  function normChannel(v){ return String(v||'').trim().toLowerCase().replace(/^#/, ''); }
  function normColor(v,fallback){ var c=String(v||'').trim(); return c||fallback; }
  var streamMap={};
  (Array.isArray(streams)?streams:[]).forEach(function(s){ var ch=normChannel(s&&s.channel); if(!ch||streamMap[ch]) return; streamMap[ch]={ channel:ch, color:normColor(s&&s.color, '') }; });
  var channels=Object.keys(streamMap);
  function esc(s){return String(s||'').replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]||c;});}
  function norm(item){ if(item&&typeof item==='object'){ var userName=String(item.user||''); var message=String(item.message||item.text||''); var text=String(item.text||(userName?(userName+': '+message):message)); return {kind:item.kind||(userName?'chat':'line'),user:userName,message:message,text:text,room:normChannel(item.room||''),color:normColor(item.color,''),chatterColor:normColor(item.chatterColor,'')}; } var text=String(item||''); var idx=text.indexOf(': '); if(idx>0) return {kind:'chat',user:text.slice(0,idx),message:text.slice(idx+2),text:text,room:'',color:'',chatterColor:''}; return {kind:'line',user:'',message:text,text:text,room:'',color:'',chatterColor:''}; }
  function accent(seed){ var src=String(seed||'chat'),hash=0; for(var i=0;i<src.length;i++){ hash=((hash<<5)-hash)+src.charCodeAt(i); hash|=0; } return 'hsl('+(Math.abs(hash)%360)+' 72% 62%)'; }
  function streamColor(item){ var room=normChannel(item&&item.room||''); var stream=room?streamMap[room]:null; return stream?normColor(stream.color,''):''; }
  function accentFor(item,index){ if(utilCustomColors){ return normColor(streamColor(item), '#eed583'); } return normColor(item.chatterColor, accent(item.user||item.room||index||'chat')); }
  function msgColor(item,index){ return '#eed583'; }
  function normalRow(item,index){ var n=norm(item); var color=accentFor(n,index); return '<div style="padding:9px 14px;border-radius:16px;background:rgba(8,12,20,.62);border:1px solid rgba(255,255,255,.08);box-shadow:0 10px 18px rgba(0,0,0,.18)">'+(n.room?'<div style="font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:'+color+';opacity:.85">#'+esc(n.room)+'</div>':'')+(n.user?'<div style="font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:'+color+';margin-bottom:3px">'+esc(n.user)+'</div>':'')+'<div style="line-height:1.35;color:'+msgColor(n,index)+'">'+esc(n.message||n.text)+'</div></div>'; }
  function textChatRow(item,index){ var n=norm(item); var color=accentFor(n,index); return '<div style="position:relative;padding:11px 15px 12px 19px;border-radius:16px;background:linear-gradient(135deg, rgba(7,10,18,.92), rgba(24,30,48,.82));border:1px solid rgba(255,255,255,.12);box-shadow:0 12px 24px rgba(0,0,0,.24);overflow:hidden"><div style="position:absolute;left:0;top:0;bottom:0;width:5px;background:'+color+'"></div>'+(n.room?'<div style="font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:'+color+';opacity:.9;padding-left:2px">#'+esc(n.room)+'</div>':'')+(n.user?'<div style="font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:'+color+';margin-bottom:4px;padding-left:2px">'+esc(n.user)+'</div>':'')+'<div style="font-size:16px;line-height:1.3;color:'+msgColor(n,index)+';font-weight:700;padding-left:2px">'+esc(n.message||n.text)+'</div></div>'; }
  function bubbleRow(item,index){ var n=norm(item); var color=accentFor(n,index); return '<div style="padding:10px 14px;border-radius:22px;background:linear-gradient(135deg, rgba(18,22,34,.92), rgba(48,56,88,.84));border:1px solid rgba(255,255,255,.12);box-shadow:0 14px 28px rgba(0,0,0,.26);backdrop-filter:blur(6px);max-width:78%">'+(n.room?'<div style="font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:'+color+';opacity:.9;margin-bottom:2px">#'+esc(n.room)+'</div>':'')+(n.user?'<div style="font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:'+color+';margin-bottom:2px">'+esc(n.user)+'</div>':'')+'<div style="font-size:16px;line-height:1.25;color:'+msgColor(n,index)+';font-weight:700;text-shadow:0 1px 1px rgba(0,0,0,.35)">'+esc(n.message||n.text)+'</div></div>'; }
  var listBodyEl=null;
  function ensureListBody(){
    if(!listEl) return null;
    if(listBodyEl && listEl.contains(listBodyEl)) return listBodyEl;
    if(mode==='chat' && utilStyle==='bubble'){
      listEl.innerHTML='<div data-ut-items="1" style="display:flex;flex-direction:column;align-items:flex-start;gap:8px;overflow:hidden;height:100%;min-height:0;justify-content:flex-end"></div>';
    } else if(mode==='chat' && utilStyle==='text-chat'){
      var textAnim='ut_textchat_3';
      listEl.innerHTML='<style>@keyframes '+textAnim+'{0%{transform:translate3d(0,22%,0);opacity:0}100%{transform:translate3d(0,0,0);opacity:1}}</style><div data-ut-items="1" style="display:flex;flex-direction:column;gap:6px;overflow:hidden;height:100%;min-height:0;justify-content:flex-end"></div>';
    } else {
      listEl.innerHTML='<div data-ut-items="1" style="display:flex;flex-direction:column;gap:6px;overflow:hidden;height:100%;min-height:0;justify-content:flex-end"></div>';
    }
    listBodyEl=listEl.querySelector('[data-ut-items="1"]');
    return listBodyEl;
  }
  function renderRow(item,index,animateNew){
    if(mode==='chat' && utilStyle==='bubble') return bubbleRow(item,index);
    if(mode==='chat' && utilStyle==='text-chat'){
      var textAnim='ut_textchat_3';
      var dur=animateNew?Math.max(.22,.32):Math.max(.22,.34+(index*.04));
      return '<div style="animation:'+textAnim+' '+dur+'s cubic-bezier(.18,.7,.22,1) both">'+textChatRow(item,index)+'</div>';
    }
    return normalRow(item,index);
  }
  function render(){
    if(!listEl) return;
    if(headEl){ headEl.textContent='Twitch '+mode.toUpperCase(); }
    if(!items.length){ listBodyEl=null; listEl.innerHTML='<div style="opacity:.7;display:flex;align-items:center;justify-content:center;height:100%;min-height:0">Waiting for Twitch data...</div>'; return; }
    var body=ensureListBody();
    if(!body) return;
    body.innerHTML=items.map(function(item,index){ return renderRow(item,index,false); }).join('');
  }
  function push(x){
    items.push(x);
    if(items.length>maxItems) items=items.slice(-maxItems);
    if(!listEl) return;
    if(headEl){ headEl.textContent='Twitch '+mode.toUpperCase(); }
    var body=ensureListBody();
    if(!body){ render(); return; }
    body.insertAdjacentHTML('beforeend', renderRow(x, items.length - 1, true));
    while(body.children.length>items.length){ body.removeChild(body.firstElementChild); }
    while(body.children.length>maxItems){ body.removeChild(body.firstElementChild); }
  }
  function parseTags(tagPart){ var out={}; String(tagPart||'').split(';').forEach(function(p){var i=p.indexOf('='); if(i>-1) out[p.slice(0,i)]=p.slice(i+1);}); return out; }
  if(!channels.length){ if(listEl) listEl.textContent='Set streamer channels in editor'; return; }
  var anon = !(user&&token);
  if(anon){ user='justinfan'+String(Math.floor(10000+Math.random()*89999)); token='SCHMOOPIIE'; }
  render();
  var ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
  ws.onopen=function(){ ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands'); ws.send('PASS '+token); ws.send('NICK '+user); channels.forEach(function(ch){ ws.send('JOIN #'+ch); }); if(headEl) headEl.textContent='Twitch '+mode.toUpperCase()+' • '+(anon?'connected anonymously':'connected'); };
  ws.onmessage=function(e){ String(e.data||'').split('\r\n').filter(Boolean).forEach(function(raw){
    if(raw.indexOf('PING')===0){ ws.send(raw.replace('PING','PONG')); return; }
    var tagPart=''; var core=raw;
    if(raw.indexOf('@')===0){ var firstSpace=raw.indexOf(' '); if(firstSpace>1){ tagPart=raw.slice(1,firstSpace); core=raw.slice(firstSpace+1); } }
    var priv = core.match(/^:([^!]+)![^ ]+ PRIVMSG #([^ ]+) :([\s\S]*)$/);
    if(priv){ var tags=parseTags(tagPart),name=priv[1],room=priv[2].toLowerCase(),msg=priv[3],stream=streamMap[room]; if(!stream) return;
      if(mode==='chat'){ var chatterColor=normColor(tags.color||'',''); var customColor=utilCustomColors?stream.color:''; push({kind:'chat',room:room,color:customColor,chatterColor:chatterColor,user:name,message:msg,text:name+': '+msg}); }
      return;
    }
    var notice = core.match(/^:tmi\.twitch\.tv USERNOTICE #([^ ]+)(?: :([\s\S]*))?$/);
    if(notice){ return; }
  }); };
  ws.onerror=function(){ if(headEl) headEl.textContent='Twitch '+mode.toUpperCase()+' • error'; if(!items.length && listEl) listEl.innerHTML='<div style="opacity:.7;display:flex;align-items:center;justify-content:center;height:100%;min-height:0">Twitch connection error</div>'; };
  ws.onclose=function(){ if(headEl) headEl.textContent='Twitch '+mode.toUpperCase()+' • disconnected'; if(!items.length && listEl) listEl.innerHTML='<div style="opacity:.7;display:flex;align-items:center;justify-content:center;height:100%;min-height:0">Disconnected</div>'; };
})();
</script>
</div>

</div>
